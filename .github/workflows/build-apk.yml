name: Build Billing Demo APK

# 触发条件：main分支提交代码时自动运行，也可手动执行
on:
  push:
    branches: [ main ]
  workflow_dispatch: # 支持手动点击运行流水线

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置JDK（安卓编译必须）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. 缓存Gradle依赖，加速下次编译
      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      # 4. 进入ClassyTaxiJava目录，执行Release打包
      - name: Build Release APK
        working-directory: ./ClassyTaxiJava
        run: ./gradlew assembleRelease

      # 5. 上传编译好的APK，编译完成后可下载
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ClassyTaxiJava/app/build/outputs/apk/release/app-release-unsigned.apk
